name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # avoid installing large compiled deps (torch) in CI here
          pip install --no-deps -r requirements.txt || true
          pip install pytest

      - name: Run Jarvis dry-run smoke test
        run: |
          python -c "from jarvis import Jarvis; j=Jarvis('./DeepSeek-V4-Pro','./DeepSeek-V4-Pro/inference/config.json', device='cpu', dry_run=True); print('smoke:', j.think('hello'))"

      - name: Run fetch_assets script (no-op without URLs)
        run: |
          bash scripts/fetch_assets.sh assets || true
